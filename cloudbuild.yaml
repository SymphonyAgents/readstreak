# Cloud Build configuration for ReadStreak Expo web app
# Builds Docker image and deploys to Cloud Run in multiple regions

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/readstreak:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/readstreak:latest'
      - '.'
    waitFor: ['-']

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/readstreak:$SHORT_SHA'
    waitFor: ['build-image']

  # Step 3: Deploy to us-central1
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-us-central1'
    args:
      - 'deploy'
      - 'readstreak'
      - '--image'
      - 'gcr.io/$PROJECT_ID/readstreak:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300s'
      - '--port'
      - '3000'
      - '--set-env-vars'
      - 'NODE_ENV=production'
    waitFor: ['push-image']

  # Step 4: Deploy to asia-southeast1
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-asia-southeast1'
    args:
      - 'deploy'
      - 'readstreak-asia'
      - '--image'
      - 'gcr.io/$PROJECT_ID/readstreak:$SHORT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300s'
      - '--port'
      - '3000'
      - '--set-env-vars'
      - 'NODE_ENV=production'
    waitFor: ['push-image']

  # Step 5: Smoke test us-central1
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'smoke-test-us'
    entrypoint: 'bash'
    args:
      - '-c'
      - |-
        echo "Service deployed to us-central1"
    waitFor: ['deploy-us-central1']

  # Step 6: Smoke test asia-southeast1
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'smoke-test-asia'
    entrypoint: 'bash'
    args:
      - '-c'
      - |-
        echo "Service deployed to asia-southeast1"
    waitFor: ['deploy-asia-southeast1']

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'
